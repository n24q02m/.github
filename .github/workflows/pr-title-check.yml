name: PR Title Check
on:
  workflow_call:

jobs:
  pr-title-check:
    name: PR Title Check
    if: >-
      github.event_name == 'pull_request_target'
      && github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Validate and auto-fix PR title
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          title=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title -q .title)
          if [[ "$title" =~ ^(feat|fix)(\(.+\))?:.+ ]] || [[ "$title" =~ ^chore\(release\):.+ ]]; then
            echo "Title is valid: $title"
            exit 0
          fi
          clean=$(echo "$title" | sed -E 's/^[^a-zA-Z]*//; s/^(Bolt|Sentinel|Guard|Shield|Palette): *(\[.*\] *)?//')
          if echo "$clean" | grep -qiE 'fix|bug|vulnerability|security|patch|resolve|crash|error'; then
            new_title="fix: $(echo "$clean" | sed 's/^./\L&/')"
          else
            new_title="feat: $(echo "$clean" | sed 's/^./\L&/')"
          fi
          gh pr edit "$PR_NUMBER" --repo "$REPO" --title "$new_title"
          echo "Auto-fixed: $title -> $new_title"
